name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5

      - name: Lint YAML
        run: |
          pipx install yamllint
          yamllint .

      - name: Shellcheck
        run: shellcheck scripts/*.sh

      - name: Lint chart
        run: helm lint charts/stalwart --strict

      - name: Render chart
        run: |
          helm template test charts/stalwart
          helm template test charts/stalwart | grep -q 'kind: StatefulSet'
          if helm template test charts/stalwart | grep -qE 'kind: (PodDisruptionBudget|ServiceMonitor)'; then
            echo "default render must not include PDB or ServiceMonitor"
            exit 1
          fi
          helm template test charts/stalwart --set recoveryAdmin.enabled=false
          helm template test charts/stalwart \
            --set recoveryAdmin.enabled=true \
            --set recoveryAdmin.existingSecret=recovery-admin
          helm template test charts/stalwart \
            --set recoveryAdmin.password=ci-only \
            --set bootstrap.enabled=true \
            --set bootstrap.domain=example.org \
            --set bootstrap.oidc.issuerUrl=https://sso.example.org/realms/mail
          helm template test charts/stalwart \
            --set recoveryAdmin.existingSecret=recovery-admin \
            --set bootstrap.domain=example.org \
            --set mailTls.enabled=true \
            --set mailTls.existingSecret=stalwart-tls \
            --set mailTls.hostname=mail.example.org
          helm template test charts/stalwart \
            --set mailService.enabled=true \
            --set mailService.name=stalwart-mail
          helm template test charts/stalwart -f charts/stalwart/ci/ha-cluster-values.yaml

      - name: Lint manifests
        uses: stackrox/kube-linter-action@v1
        with:
          directory: charts/stalwart
          config: .kube-linter.yaml
