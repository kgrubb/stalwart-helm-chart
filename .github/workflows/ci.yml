name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5

      - name: Lint YAML
        run: |
          pipx install yamllint
          yamllint .

      - name: Lint chart
        run: helm lint charts/stalwart --strict

      - name: Render chart
        run: |
          helm template test charts/stalwart
          helm template test charts/stalwart --set recoveryAdmin.enabled=false
          helm template test charts/stalwart \
            --set recoveryAdmin.enabled=true \
            --set recoveryAdmin.existingSecret=recovery-admin
          helm template test charts/stalwart \
            --set recoveryAdmin.password=ci-only \
            --set bootstrap.enabled=true \
            --set bootstrap.domain=example.org \
            --set bootstrap.oidc.issuerUrl=https://sso.example.org/realms/mail

      - name: Lint manifests
        uses: stackrox/kube-linter-action@v1
        with:
          directory: charts/stalwart
          config: .kube-linter.yaml
