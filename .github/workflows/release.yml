name: Release Charts

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect chart changes
        id: changes
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "skip_bump=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --name-only "$BEFORE" "$AFTER" | grep -q '^charts/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "before=$BEFORE" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump chart version from conventional commits
        if: >-
          steps.changes.outputs.changed == 'true' &&
          steps.changes.outputs.skip_bump != 'true' &&
          !startsWith(github.event.head_commit.message, 'chore(release):')
        run: |
          chmod +x scripts/bump-chart-version.sh
          ./scripts/bump-chart-version.sh \
            "${{ steps.changes.outputs.before }}" \
            "${{ github.sha }}"

      - name: Commit version bump
        if: >-
          steps.changes.outputs.changed == 'true' &&
          steps.changes.outputs.skip_bump != 'true' &&
          !startsWith(github.event.head_commit.message, 'chore(release):')
        run: |
          if git diff --quiet charts/stalwart/Chart.yaml; then
            echo "No chart version change to commit."
            exit 0
          fi
          NEW_VERSION=$(awk '/^version:/ { print $2 }' charts/stalwart/Chart.yaml)
          git add charts/stalwart/Chart.yaml
          git commit -m "chore(release): bump chart to ${NEW_VERSION}"
          git push

      - name: Run chart-releaser
        if: >-
          steps.changes.outputs.changed == 'true' ||
          startsWith(github.event.head_commit.message, 'chore(release):')
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          config: cr.yaml
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
