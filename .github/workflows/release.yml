name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump chart version
        id: bump
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          MSG='${{ github.event.head_commit.message }}'

          [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]] && exit 0
          [[ "$MSG" =~ ^chore\(release\): ]] && exit 0

          last_tag=$(git tag -l 'stalwart-*' --sort=-v:refname | head -1)
          git diff --name-only "${last_tag:-$BEFORE}" "$AFTER" -- charts/ | grep -q . || exit 0
          echo "charts_changed=true" >> "$GITHUB_OUTPUT"
          echo "since_ref=${last_tag:-$BEFORE}" >> "$GITHUB_OUTPUT"

          chmod +x scripts/{bump-chart-version,generate-changelog}.sh
          ./scripts/bump-chart-version.sh "$BEFORE" "$AFTER"
          echo "version=$(awk '/^version:/ { print $2 }' charts/stalwart/Chart.yaml)" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        if: steps.bump.outputs.charts_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./scripts/generate-changelog.sh \
            "${{ steps.bump.outputs.since_ref }}" \
            "${{ github.sha }}" \
            "${{ steps.bump.outputs.version }}"

      - uses: azure/setup-helm@v5
        if: steps.bump.outputs.charts_changed == 'true'

      - name: Publish charts
        if: steps.bump.outputs.charts_changed == 'true'
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          config: cr.yaml
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit release artifacts
        if: steps.bump.outputs.charts_changed == 'true'
        run: |
          git add CHANGELOG.md
          git diff --quiet charts/stalwart/Chart.yaml || git add charts/stalwart/Chart.yaml
          git diff --staged --quiet && exit 0
          VERSION=$(awk '/^version:/ { print $2 }' charts/stalwart/Chart.yaml)
          git commit -m "chore(release): bump chart to ${VERSION}"
          git push
