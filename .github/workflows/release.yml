name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump chart version
        id: bump
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          MSG='${{ github.event.head_commit.message }}'

          [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]] && exit 0
          git diff --name-only "$BEFORE" "$AFTER" | grep -q '^charts/' || exit 0
          echo "charts_changed=true" >> "$GITHUB_OUTPUT"

          [[ "$MSG" =~ ^chore\(release\): ]] && exit 0

          chmod +x scripts/bump-chart-version.sh
          ./scripts/bump-chart-version.sh "$BEFORE" "$AFTER"
          git diff --quiet charts/stalwart/Chart.yaml || echo "bumped=true" >> "$GITHUB_OUTPUT"

      - uses: azure/setup-helm@v5
        if: steps.bump.outputs.charts_changed == 'true' || steps.bump.outputs.bumped == 'true'

      - name: Publish charts
        if: steps.bump.outputs.charts_changed == 'true' || steps.bump.outputs.bumped == 'true'
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          config: cr.yaml
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version bump
        if: steps.bump.outputs.bumped == 'true'
        run: |
          VERSION=$(awk '/^version:/ { print $2 }' charts/stalwart/Chart.yaml)
          git add charts/stalwart/Chart.yaml
          git commit -m "chore(release): bump chart to ${VERSION}"
          git push
