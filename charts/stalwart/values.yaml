# Container image.
image:
  repository: stalwartlabs/stalwart
  tag: "v0.16.12"
  pullPolicy: IfNotPresent

# Number of pods in the StatefulSet.
# Single-node deployments keep this at 1.
replicaCount: 1

# Maps to STALWART_ROLE. Names a ClusterRole defined in the database.
# Leave empty on single-node installs to run every task and listener.
role: ""

# Maps to STALWART_PUSH_SHARD. Only set on nodes whose role delivers
# push notifications. Leave empty on single-node installs.
pushShard: ""

# Recovery / bootstrap administrator credential.
# Enable this on first install so the operator can sign in without
# scraping the pod logs for the generated temporary password.
# Remove it once a permanent administrator account has been provisioned.
recoveryAdmin:
  enabled: false
  username: admin
  password: ""
  existingSecret: ""
  usernameKey: username
  passwordKey: password

# Starts the pods in recovery mode. Suspends mail services and
# exposes only the management listener on the configured port.
recoveryMode:
  enabled: false
  port: 8080
  logLevel: info

# Extra environment variables injected into the container.
extraEnv: {}

# Extra environment variables injected from the managed Secret.
extraSecretEnv: {}

# Hook Job: domain, accounts, and OIDC directory via JMAP.
bootstrap:
  enabled: false
  # How long completed bootstrap Jobs remain before garbage collection.
  ttlSecondsAfterFinished: 300
  apiUrl: ""
  domain: ""
  accounts: []
  groups: []
  oidc:
    issuerUrl: ""
    description: ""
    requireAudience: ""
    requireScopes: []
    claimUsername: ""
    usernameDomain: ""
    claimName: ""
    claimGroups: ""

# Reuse a cert-manager TLS secret (typically the ingress certificate) for
# IMAP/SMTP listeners. A sidecar watches the mounted files and reloads
# Stalwart when cert-manager renews the secret.
mailTls:
  enabled: false
  existingSecret: ""
  certKey: tls.crt
  privateKeyKey: tls.key
  mountPath: /etc/stalwart/tls/ingress
  hostname: ""
  domain: ""
  reloadIntervalSeconds: 300

# config.json contents. Rendered verbatim into the ConfigMap.
# Only the DataStore object belongs here.
config:
  "@type": RocksDb
  path: /var/lib/stalwart

# Service definition. Keep ClusterIP when ingress exposes the management UI
# and mailService exposes L4 mail ports on a separate LoadBalancer IP.
service:
  type: ClusterIP
  ports:
    smtp: 25
    smtps: 465
    submission: 587
    imap: 143
    imaps: 993
    pop3: 110
    pop3s: 995
    sieve: 4190
    http: 80
    https: 443
    mgmt: 8080

# Optional LoadBalancer for SMTP/IMAP/POP3/Sieve only. Use when the main
# service stays ClusterIP and ingress routes HTTP to the management listener.
mailService:
  enabled: false
  # Optional fixed name (e.g. stalwart-mail) when adopting a hand-maintained LoadBalancer Service.
  name: ""
  type: LoadBalancer
  loadBalancerIP: ""
  annotations: {}

# Ingress for the HTTP / HTTPS listeners only.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: mail.example.org
      paths:
        - path: /
          pathType: Prefix
          portName: https
  tls: []

# Persistent volume for the data directory.
persistence:
  enabled: true
  accessMode: ReadWriteOnce
  storageClass: ""
  size: 20Gi

# Set requests/limits per environment.
resources: {}

podSecurityContext:
  fsGroup: 2000
  runAsUser: 2000
  runAsGroup: 2000
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# NET_BIND_SERVICE is required for the privileged mail ports.
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE
