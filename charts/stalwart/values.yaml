image:
  repository: stalwartlabs/stalwart
  tag: "v0.16.8"
  pullPolicy: IfNotPresent

replicaCount: 1
role: ""
pushShard: ""

# Enable on first install, then disable after provisioning an admin account.
recoveryAdmin:
  enabled: false
  username: admin
  password: ""

recoveryMode:
  enabled: false
  port: 8080
  logLevel: info

extraEnv: {}
extraSecretEnv: {}

config:
  "@type": RocksDb
  path: /var/lib/stalwart

service:
  type: ClusterIP
  ports:
    smtp: 25
    smtps: 465
    submission: 587
    imap: 143
    imaps: 993
    pop3: 110
    pop3s: 995
    sieve: 4190
    http: 80
    https: 443
    mgmt: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: mail.example.org
      paths:
        - path: /
          pathType: Prefix
          portName: https
  tls: []

persistence:
  enabled: true
  accessMode: ReadWriteOnce
  storageClass: ""
  size: 20Gi

resources: {}

podSecurityContext:
  fsGroup: 2000
  runAsUser: 2000
  runAsGroup: 2000

containerSecurityContext: {}
