apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "stalwart.fullname" . }}
  labels:
    {{- include "stalwart.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "stalwart.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "stalwart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "stalwart.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if include "stalwart.mailTls.enabled" . }}
        checksum/tls-sync: {{ include (print $.Template.BasePath "/tls-sync-configmap.yaml") . | sha256sum }}
        {{- end }}
        {{- if include "stalwart.needsChartEnvSecret" . }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: stalwart
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args:
            - "--config"
            - "/etc/stalwart/config.json"
          {{- if or .Values.role .Values.pushShard .Values.recoveryMode.enabled (not (empty .Values.extraEnv)) (and (include "stalwart.recoveryAdminOnPod" .) .Values.recoveryAdmin.existingSecret) }}
          env:
            {{- if .Values.role }}
            - name: STALWART_ROLE
              value: {{ .Values.role | quote }}
            {{- end }}
            {{- if .Values.pushShard }}
            - name: STALWART_PUSH_SHARD
              value: {{ .Values.pushShard | quote }}
            {{- end }}
            {{- if .Values.recoveryMode.enabled }}
            - name: STALWART_RECOVERY_MODE
              value: "true"
            - name: STALWART_RECOVERY_MODE_PORT
              value: {{ .Values.recoveryMode.port | quote }}
            - name: STALWART_RECOVERY_MODE_LOG_LEVEL
              value: {{ .Values.recoveryMode.logLevel | quote }}
            {{- end }}
            {{- range $key, $value := .Values.extraEnv }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if and (include "stalwart.recoveryAdminOnPod" .) .Values.recoveryAdmin.existingSecret }}
            {{- include "stalwart.recoveryAdmin.env" . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- if or (not (empty .Values.extraSecretEnv)) (and (include "stalwart.recoveryAdminOnPod" .) (not .Values.recoveryAdmin.existingSecret) .Values.recoveryAdmin.password) }}
          envFrom:
            - secretRef:
                name: {{ include "stalwart.fullname" . }}-env
          {{- end }}
          ports:
            - name: smtp
              containerPort: 25
            - name: smtps
              containerPort: 465
            - name: submission
              containerPort: 587
            - name: imap
              containerPort: 143
            - name: imaps
              containerPort: 993
            - name: pop3
              containerPort: 110
            - name: pop3s
              containerPort: 995
            - name: sieve
              containerPort: 4190
            - name: http
              containerPort: 80
            - name: https
              containerPort: 443
            - name: mgmt
              containerPort: 8080
          startupProbe:
            exec:
              command:
                - curl
                - -sf
                - http://127.0.0.1:{{ .Values.service.ports.mgmt }}/healthz/ready
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            exec:
              command:
                - curl
                - -sf
                - http://127.0.0.1:{{ .Values.service.ports.mgmt }}/healthz/live
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - curl
                - -sf
                - http://127.0.0.1:{{ .Values.service.ports.mgmt }}/healthz/ready
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /etc/stalwart/config.json
              subPath: config.json
              readOnly: true
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /var/lib/stalwart
            {{- end }}
            {{- if include "stalwart.mailTls.enabled" . }}
            - name: mail-tls
              mountPath: {{ .Values.mailTls.mountPath }}
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if include "stalwart.mailTls.enabled" . }}
        - name: tls-sync
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command: ["python", "/scripts/tls-sync.py"]
          env:
            - name: STALWART_API_URL
              value: "http://127.0.0.1:{{ .Values.service.ports.mgmt }}"
            - name: TLS_MOUNT_PATH
              value: {{ .Values.mailTls.mountPath | quote }}
            - name: TLS_CERT_FILE
              value: {{ .Values.mailTls.certKey | quote }}
            - name: TLS_KEY_FILE
              value: {{ .Values.mailTls.privateKeyKey | quote }}
            - name: TLS_HOSTNAME
              value: {{ include "stalwart.mailTls.hostname" . | quote }}
            - name: TLS_DOMAIN
              value: {{ default .Values.bootstrap.domain .Values.mailTls.domain | quote }}
            - name: TLS_RELOAD_INTERVAL_SECONDS
              value: {{ .Values.mailTls.reloadIntervalSeconds | quote }}
            {{- include "stalwart.recoveryAdmin.env" . | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 2000
            runAsGroup: 2000
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: mail-tls
              mountPath: {{ .Values.mailTls.mountPath }}
              readOnly: true
            - name: tls-sync-script
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "stalwart.fullname" . }}-config
        {{- if include "stalwart.mailTls.enabled" . }}
        - name: mail-tls
          secret:
            secretName: {{ .Values.mailTls.existingSecret }}
        - name: tls-sync-script
          configMap:
            name: {{ include "stalwart.fullname" . }}-tls-sync
        {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode | quote }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
  {{- end }}
