{{- if and .Values.recoveryAdmin.enabled (not .Values.recoveryAdmin.password) }}
{{- fail "recoveryAdmin.password is required when recoveryAdmin.enabled is true" }}
{{- end }}
{{- if or .Values.recoveryAdmin.enabled (not (empty .Values.extraSecretEnv)) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "stalwart.fullname" . }}-env
  labels:
    {{- include "stalwart.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.recoveryAdmin.enabled }}
  STALWART_RECOVERY_ADMIN: {{ printf "%s:%s" .Values.recoveryAdmin.username .Values.recoveryAdmin.password | quote }}
  {{- end }}
  {{- range $key, $value := .Values.extraSecretEnv }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
