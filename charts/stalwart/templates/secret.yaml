{{- if and .Values.recoveryAdmin.enabled (not .Values.recoveryAdmin.existingSecret) (not .Values.recoveryAdmin.password) }}
{{- fail "recoveryAdmin.password or recoveryAdmin.existingSecret is required when recoveryAdmin.enabled is true" }}
{{- end }}
{{- if include "stalwart.needsChartEnvSecret" . }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "stalwart.fullname" . }}-env
  labels:
    {{- include "stalwart.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if and (or .Values.recoveryAdmin.enabled .Values.bootstrap.enabled) (not .Values.recoveryAdmin.existingSecret) .Values.recoveryAdmin.password }}
  STALWART_RECOVERY_ADMIN: {{ printf "%s:%s" .Values.recoveryAdmin.username .Values.recoveryAdmin.password | quote }}
  {{- end }}
  {{- range $key, $value := .Values.extraSecretEnv }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
